<html lang="ko">
<head>
    <meta charset="UTF-8">

    <style>
        :root { 
            --p1: #ff7675; --p2: #74b9ff; --p3: #fab1a0; --p4: #55efc4;
            --main-blue: #81ecec;
        }
        
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            /* 배경: 회색을 걷어내고 밝고 귀여운 하늘색 + 지도 배경 */
            background: #a2d2ff url('https://www.transparenttextures.com/patterns/clouds.png');

            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center; 
            margin: 0; padding: 5px; color: #2d3436; overflow: hidden; height: 100vh; 
        }

        #round-tracker { 
            background: white; color: #0984e3; padding: 10px 50px; 
            border-radius: 0 0 40px 40px; font-weight: 900; font-size: 24px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); z-index: 10;
            border: 4px solid white; border-top: none;
        }

        #scoreboard { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 95%; max-width: 700px; margin: 15px 0; }
        .score-box { 
            padding: 12px; border-radius: 25px; background: rgba(255,255,255,0.9); 
            text-align: center; border: 4px solid transparent; font-size: 16px; transition: 0.3s;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .score-box.active { background: #fff; border-color: #fdcb6e; transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .score-box b { font-size: 22px; color: #2d3436; }

        /* 말판 레이아웃: 투명하고 귀엽게 */
        #board { 
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr); 
            gap: 8px; width: 94vw; max-width: 640px; height: 94vw; max-height: 640px; 
            background: rgba(255,255,255,0.3); padding: 15px; border-radius: 35px; position: relative;
            border: 10px solid white; backdrop-filter: blur(5px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.2);
        }

        .tile { 
            background: rgba(255, 255, 255, 0.95); border-radius: 18px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; font-size: 13px; text-align: center; 
            color: #2d3436; position: relative; border-bottom: 6px solid #dfe6e9; font-weight: 900;
            transition: 0.2s;
        }
        .tile.selectable { cursor: pointer; border: 5px solid #fdcb6e !important; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.05);} }

        .tile.special { background: #ffeaa7 !important; }
        .tile.chance { background: #fab1a0 !important; }
        .tile-icon { font-size: 28px; margin-bottom: 3px; }
        .tile-point { position: absolute; bottom: 3px; right: 8px; font-size: 11px; color: #ff7675; }

        #ui-center { 
            grid-row: 2 / 8; grid-column: 2 / 8; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.1); border-radius: 40px; margin: 10px;
        }

        /* 3D 주사위 커스터마이징 */
        .scene { width: 90px; height: 90px; perspective: 400px; margin-bottom: 25px; }
        .dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s; }
        .dice-face { position: absolute; width: 90px; height: 90px; background: white; border: 5px solid #74b9ff; line-height: 90px; font-size: 45px; font-weight: 900; color: #0984e3; text-align: center; border-radius: 20px; }
        .front { transform: rotateY(0deg) translateZ(45px); } .back { transform: rotateY(180deg) translateZ(45px); }
        .right { transform: rotateY(90deg) translateZ(45px); } .left { transform: rotateY(-90deg) translateZ(45px); }
        .top { transform: rotateX(90deg) translateZ(45px); } .bottom { transform: rotateX(-90deg) translateZ(45px); }

        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 75%; }
        button { 
            padding: 15px; font-size: 22px; cursor: pointer; background: #74b9ff; 
            color: white; border: none; border-radius: 25px; font-weight: 900; 
            box-shadow: 0 8px #0984e3; transition: 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        .stop-btn { background: #ff7675; box-shadow: 0 8px #d63031; font-size: 18px; }

        .piece { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 32px; position: absolute; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.2));
        }

        /* 퀴즈 모달 디자인 (귀엽게) */
        #modal-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index:200; }
        #modal { 
            display: none; position: fixed; top:50%; left:50%; transform:translate(-50%, -50%); 
            background:white; color: #2d3436; padding:35px; border-radius:50px; z-index:201; 
            width:85%; max-width:480px; text-align:center; box-shadow: 0 30px 70px rgba(0,0,0,0.3);
            border: 8px solid #74b9ff;
        }
        #timer-bar { width: 100%; height: 18px; background: #f1f2f6; border-radius: 15px; overflow: hidden; margin: 15px 0; }
        #timer-progress { width: 100%; height: 100%; background: #ff7675; transition: width 1s linear; }
        input { width: 85%; padding: 18px; font-size: 30px; border: 6px solid #74b9ff; border-radius: 25px; text-align: center; margin-bottom: 25px; outline: none; background: #f9f9f9; }

        #result-screen { 
            display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
            background: #a2d2ff; z-index:500; flex-direction: column; align-items: center; justify-content: center; 
        }
        #status-msg { font-weight: 900; color: #0984e3; margin-top: 15px; font-size: 20px; text-shadow: 1px 1px 0px white; }
    </style>
</head>

    const pColors = ['#ff7675', '#74b9ff', '#fab1a0', '#55efc4'];

    const board = document.getElementById('board');
    tilesData.forEach((tile, i) => {
        const t = document.createElement('div');
        t.className = `tile ${tile.type || ''}`;
        t.style.gridRow = tile.r; t.style.gridColumn = tile.c;
        t.innerHTML = `<div class="tile-icon">${tile.icon}</div>${tile.name || tile.label}${tile.value ? `<div class="tile-point">${tile.value}P</div>` : ''}`;
        t.id = `tile-${i}`;
        t.onclick = () => selectTile(i);
        board.appendChild(t);
    });

    function updateView() {
        players.forEach((p, i) => {
            const tile = document.getElementById(`tile-${p.pos}`);
            const piece = document.getElementById(`piece-${i}`);
            const offsets = [[2,2], [22,2], [2,22], [22,22]];
            piece.style.top = (tile.offsetTop + offsets[i][1]) + 'px';
            piece.style.left = (tile.offsetLeft + offsets[i][0]) + 'px';
            document.getElementById(`score-${i}`).querySelector('b').innerText = p.score;
            document.getElementById(`score-${i}`).classList.toggle('active', turn === i);
        });
        const btn = document.getElementById('dice-btn');
        if (players[turn].worldTravel) {
            btn.innerText = "세계여행 출발! ✨";
            btn.style.background = "#fdcb6e";
            btn.style.boxShadow = "0 8px #e17055";
        } else {
            btn.innerText = "주사위 던지기! 🎲";
            btn.style.background = "#74b9ff";
            btn.style.boxShadow = "0 8px #0984e3";
        }
    }

    function handleTurn() {
        if (isMoving || isSelecting) return;
        document.getElementById('bgm').play().catch(()=>{});
        if (players[turn].worldTravel) startWorldTravel();
        else rollDice();
    }

    async function rollDice() {
        isMoving = true;
        document.getElementById('dice-btn').disabled = true;
        const dice = document.getElementById('dice');
        dice.style.animation = "rolling 0.1s infinite linear";
        await new Promise(r => setTimeout(r, 800));
        dice.style.animation = "none";
        const val = Math.floor(Math.random()*6)+1;
        const rots = [{x:0,y:0},{x:90,y:0},{x:0,y:-90},{x:0,y:90},{x:-90,y:0},{x:0,y:180}];
        const r = rots[val-1];
        dice.style.transform = `translateZ(-45px) rotateX(${r.x}deg) rotateY(${r.y}deg)`;
        await new Promise(r => setTimeout(r, 600));

        for(let i=0; i<val; i++) {
            const oldPos = players[turn].pos;
            players[turn].pos = (players[turn].pos + 1) % tilesData.length;
            if (players[turn].pos === 0 && oldPos !== 0) {
                players[turn].score += 100;
                showLapBonus();
            }
            updateView();
            await new Promise(res => setTimeout(res, 200));
        }
        processTile();
    }

    function showLapBonus() {
        const msg = document.createElement('div');
        msg.innerText = "🎈 시작점 통과! 보너스 +100P!";
        msg.style.position = 'fixed'; msg.style.top = '15%'; msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)'; msg.style.background = '#55efc4';
        msg.style.color = 'white'; msg.style.padding = '15px 40px'; msg.style.borderRadius = '40px';
        msg.style.zIndex = '1000'; msg.style.fontWeight = '900'; msg.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 1500);
    }

    function startWorldTravel() {
        isSelecting = true;
        document.getElementById('status-msg').innerText = "✈️ 가고 싶은 칸을 골라보세요!";
        tilesData.forEach((_, i) => document.getElementById(`tile-${i}`).classList.add('selectable'));
    }

    async function selectTile(index) {
        if (!isSelecting) return;
        isSelecting = false;
        players[turn].worldTravel = false;
        tilesData.forEach((_, i) => document.getElementById(`tile-${i}`).classList.remove('selectable'));
        players[turn].pos = index;
        updateView();
        await new Promise(r => setTimeout(r, 500));
        processTile();
    }

    function processTile() {
        const tile = tilesData[players[turn].pos];
        if (tile.name === "세계여행") {
            players[turn].worldTravel = true;
            alert("✈️ 세계여행! 다음 턴에 원하는 곳으로 날아갈 수 있어요!");
            nextTurn();
        } else if (tile.type === 'special' || tile.type === 'chance') {
            if (tile.type === 'chance') {
                const bonus = [50, 100, -50][Math.floor(Math.random()*3)];
                players[turn].score += bonus;
                alert(`❓ 지리 찬스! 점수가 ${bonus}P 바뀌었습니다.`);
            }
            nextTurn();
        } else if (tile.owner !== undefined && tile.owner !== turn) {
            const fee = Math.floor(tile.value * 0.5);
            players[turn].score -= fee;
            players[tile.owner].score += fee;
            alert(`🏘️ ${pIcons[tile.owner]} 친구의 땅이에요! 통행료 ${fee}P를 냈습니다.`);
            nextTurn();
        } else {
            openQuiz(tile);
        }
    }

    function openQuiz(tile) {
        const quizObj = tile.pool[Math.floor(Math.random() * tile.pool.length)];
        currentCorrectAns = quizObj.a;
        currentCorrectAns2 = quizObj.a2 || "";

        document.getElementById('modal-bg').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
        document.getElementById('m-quiz').innerText = quizObj.q;
        const input = document.getElementById('m-answer');
        input.value = ''; input.focus();

        let timeLeft = 60;
        const progress = document.getElementById('timer-progress');
        document.getElementById('timer-text').innerText = `남은 시간: ${timeLeft}초`;
        progress.style.width = '100%';

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-text').innerText = `남은 시간: ${timeLeft}초`;
            progress.style.width = (timeLeft / 60 * 100) + '%';
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert("⏰ 시간 초과! 아쉽지만 다음 기회에!");
                closeModal();
                nextTurn();
            }
        }, 1000);
    }

    function checkAnswer() {
        clearInterval(timerInterval);
        const input = document.getElementById('m-answer').value.trim().replace(/\s/g, "");
        if(!input) return;
        const tile = tilesData[players[turn].pos];
        const isCorrect = (input === currentCorrectAns.replace(/\s/g, "") || (currentCorrectAns2 && input === currentCorrectAns2.replace(/\s/g, "")));

        if (isCorrect) {
            alert(`✅ 정답! ${tile.value}P를 얻고 땅을 점령했어요!`);
            players[turn].score += tile.value;
            tile.owner = turn;
            const el = document.getElementById(`tile-${players[turn].pos}`);
            el.style.background = pColors[turn]; el.style.color = 'white';
            el.innerHTML = `<div class="tile-icon">${tile.icon}</div>${currentCorrectAns}`;
        } else {
            alert(`❌ 틀렸습니다! 더 열심히 공부해서 다시 도전해요!`);
        }
        closeModal();
        nextTurn();
    }

    function closeModal() {
        document.getElementById('modal-bg').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
        clearInterval(timerInterval);
    }

    function nextTurn() {
        turn = (turn + 1) % 4;
        if (turn === 0) {
            round++;
            document.getElementById('curr-round').innerText = round;
        }
        document.getElementById('status-msg').innerText = `${pIcons[turn]} ${turn+1}번 친구 차례!`;
        document.getElementById('dice-btn').disabled = false;
        isMoving = false;
        updateView();
    }

    function confirmEnd() {
        if (confirm("탐험을 마치고 결과를 확인해볼까요?")) {
            const sorted = players.map((p, i) => ({id:i, score:p.score})).sort((a,b) => b.score - a.score);
            const list = document.getElementById('rank-list');
            list.innerHTML = "";
            sorted.forEach((p, idx) => {
                list.innerHTML += `<div style="background:white; width:340px; padding:20px; margin:10px; border-radius:30px; font-size:28px; font-weight:900; display:flex; justify-content:space-between; border: 5px solid ${pColors[p.id]}; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                    <span>${idx+1}등 ${pIcons[p.id]}</span> <span>${p.score}P</span>
                </div>`;
            });
            document.getElementById('result-screen').style.display = 'flex';
        }
    }

    document.getElementById('m-answer').onkeyup = (e) => { if(e.key==='Enter') checkAnswer(); };
    window.onload = updateView;
</script>

<style>
    @keyframes rolling {
        0% { transform: translateZ(-45px) rotateX(0) rotateY(0); }
        100% { transform: translateZ(-45px) rotateX(360deg) rotateY(360deg); }
    }
</style>
</body>
</html>
